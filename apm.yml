name: kolu
version: 1.0.0
description: Terminal multiplexer with AI-native development workflow
type: hybrid
targets:
  - claude
  - codex
  - opencode

# Generated AGENTS.md files are runtime outputs, not source inputs. Excluding
# them keeps distributed compilation from treating stale generated files as
# additional placement anchors on subsequent `apm compile` runs.
compilation:
  exclude:
    - AGENTS.md
    - "**/AGENTS.md"
    - node_modules/**
    - "**/node_modules/**"

# Update a dependency: just ai::apm-update <package>  (e.g. srid/agency)
# Reinstall all:       just ai::apm
dependencies:
  apm:
    - srid/agency#master
    - juspay/skills/skills/nix-justfile
    - juspay/skills/skills/nix-typescript
    - juspay/skills/skills/pg
    - anthropics/skills/skills/frontend-design
    - juspay/nix-chrome-devtools-mcp
    - juspay/odu
    - juspay/project-unknown
